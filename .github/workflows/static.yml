    <section id="abstract">
      <h2>ABSTRACT</h2>
      <div class="abstract">
        <p>
          Graphical User Interface (GUI) agent is pivotal to advancing intelligent humancomputer interaction paradigms.
          Constructing powerful GUI agents necessitates the large-scale annotation of high-quality user-behavior trajectory data (i.e., intent-trajectory pairs) for training.
          However, manual annotation methods and current GUI agent data mining approaches typically face three critical challenges:
          high construction cost, poor data quality, and low data richness.
          To address these issues, we propose M<span class="sup">2</span>-Miner, the first low-cost and automated mobile GUI agent data-mining framework based on Monte Carlo Tree Search (MCTS).
          For better data mining efficiency and quality, we present a collaborative multi-agent framework, comprising InferAgent, OrchestraAgent, and JudgeAgent for guidance, acceleration, and evaluation.
          To further enhance the efficiency of mining and enrich intent diversity, we design an intent recycling strategy to extract extra valuable interaction trajectories.
          Additionally, a progressive model-in-the-loop training strategy is introduced to improve the success rate of data mining.
          Extensive experiments have demonstrated that the GUI agent fine-tuned using our mined data achieves state-of-the-art performance on several commonly used mobile GUI benchmarks.
          Our work will be released to facilitate the community research.
        </p>
      </div>
    </section>

    <section id="mcts">
      <h2>Overview</h2>
      <p>
        Given the urgent demand for high-quality GUI agent data and the laborious challenge of manually
        annotating interaction trajectories, we propose M<span class="sup">2</span>-Miner, the first automated mobile GUI agent
        data-mining framework based on Monte Carlo Tree Search (MCTS), as illustrated in Fig. 1. Based on vanilla MCTS, we specifically
        employ a collaborative multi-agent framework, which comprises an InferAgent, OrchestraAgent, and JudgeAgent, to enhance the expansion and simulation phases. Our approach reduces costs and
        improves both efficiency and mining success rate. Furthermore, we propose an intent recycling
        strategy to fully extract valid trajectories from the intent trajectory trees. Finally, to further boost the
        mining success rate, we introduce a model-in-the-loop training strategy to continuously evolve the
        capabilities of these agents.
      </p>

      <figure>
        <!-- 注意：文件名不要写成带 HTML 的形式，保持原始文件名 -->
        <img src="assets/M2_Miner.png" alt="M2-Miner MCTS overview and intent recycling">
        <figcaption>
          Figure 1. Overview. (a) The mining process of M<span class="sup">2</span>-Miner consists of four phases: Selection, Expansion, Simulation, and Backpropagation.
          During these phases, InferAgent, OrchestraAgent, and JudgeAgent are employed for exploration guidance, acceleration, and state evaluation.
          (b) Intent recycling process. For a selected node, its corresponding trajectory is first passed through a dedicated intent-recycling filter,
          then a novel intent is generated via MLLM. If the JudgeAgent verifies that the generated intent aligns with the trajectory, the recycling is considered complete.
        </figcaption>
      </figure>
    </section>

    <section id="infrastructure">
      <h2>Infrastructure Framework</h2>
      <p>
        We build a customized infrastructure framework that supports mobile agent data mining and modelin-the-loop training. As illustrated in Fig. 2, the framework adopts a layered architecture, consisting
        of the data layer, engine layer, algorithm layer, agent layer, execution layer, and environment layer.
        Our layered framework unifies GUI agent execution, intent-trajectory data mining, and model training into a whole, thereby forming a customized model-in-the-loop framework that can automatically
        perform end-to-end data mining and training.
      </p>

      <figure>
        <img src="assets/Miner_framework.png" alt="Infrastructure Framework figure">
        <figcaption>
          Figure 2. Infrastructure Framework. A layered framework for GUI agent data mining with modelin-the-loop training, comprising data, engine, algorithm, agent, execution, and environment layers.
        </figcaption>
      </figure>
    </section>

    <section id="mitl">
      <h2>Model-In-The-Loop Training Strategy</h2>
      <p>
        During the mining process, we observe that insufficient capabilities of the InferAgent and
        JudgeAgent led to numerous invalid explorations and inaccurate termination judgments, which resulted in a low mining success rate. Consequently, we design a progressive model-in-the-loop training strategy that iteratively improves the agents’ performance. First, in the warm-up stage, we first
        train the InferAgent and JudgeAgent using public datasets to equip the multi-agent framework with
        basic capability for trajectory mining. Subsequently, leveraging the models obtained in the warm-up
        stage, we conduct continuous training of the InferAgent and JudgeAgent through three stages. At
        each stage, we first generate intents, then use the mining framework to mine trajectory data, and subsequently retrain the model with all intent trajectory data mined prior to this stage. Fig. 3 illustrates
        the intent generation process at each stage. The proposed progressive model-in-the-loop training strategy iteratively improves both the mining success rate and the quality of the generated trajectories.
      </p>

      <figure>
        <img src="assets/intent_construct.png" alt="Progressive model-in-the-loop training strategy">
        <figcaption>
          Figure 3. Intent Generation. Our intent generation method consists of three stages: basic intents
          generation, complex intents generation, and intent recycling.
        </figcaption>
      </figure>
    </section>

